name: Build Frontend

on:
  push:
    branches: [master]
    paths: ['frontend_source/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build
        working-directory: frontend_source
        run: |
          npm ci --legacy-peer-deps
          npx vite build

      - name: Commit built dist
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add frontend_source/dist/
          git diff --cached --quiet || (git commit -m "[ci] Build frontend dist" && git push)
