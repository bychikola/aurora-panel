version: "3.8"

x-common: &common
  restart: always
  networks:
    - aurora-network

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: 5

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  aurora-db:
    image: postgres:17.6
    container_name: aurora-db
    hostname: aurora-db
    <<: [*common, *logging]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: UTC
    ports:
      - 127.0.0.1:6767:5432
    volumes:
      - aurora-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 10s
      retries: 5

  # ─── Valkey (Redis-compatible) ──────────────────────────────
  aurora-redis:
    image: valkey/valkey:9-alpine
    container_name: aurora-redis
    hostname: aurora-redis
    <<: [*common, *logging]
    volumes:
      - valkey-socket:/var/run/valkey
    command: >
      valkey-server
      --save ""
      --appendonly no
      --maxmemory-policy noeviction
      --loglevel warning
      --unixsocket /var/run/valkey/valkey.sock
      --unixsocketperm 777
      --port 0
    healthcheck:
      test: ["CMD", "valkey-cli", "-s", "/var/run/valkey/valkey.sock", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  # ─── AURORA Backend ─────────────────────────────────────────
  aurora-backend:
    image: ghcr.io/aurora/backend:2
    container_name: aurora-backend
    hostname: aurora-backend
    <<: [*common, *logging]
    env_file: .env
    volumes:
      - valkey-socket:/var/run/valkey
      - aurora-configs:/var/lib/aurora/configs
    ports:
      - 127.0.0.1:3000:${APP_PORT:-3000}
      - 127.0.0.1:3001:${METRICS_PORT:-3001}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${METRICS_PORT:-3001}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      aurora-db:
        condition: service_healthy
      aurora-redis:
        condition: service_healthy

  # ─── AURORA Frontend ────────────────────────────────────────
  aurora-frontend:
    image: ghcr.io/aurora/frontend:2
    container_name: aurora-frontend
    hostname: aurora-frontend
    <<: [*common]
    ports:
      - 127.0.0.1:3333:3333
    environment:
      DOMAIN_BACKEND: http://aurora-backend:${APP_PORT:-3000}
      NODE_ENV: production

  # ─── Caddy (Reverse Proxy) ─────────────────────────────────
  aurora-caddy:
    image: caddy:2.10-alpine
    container_name: aurora-caddy
    hostname: aurora-caddy
    <<: [*common]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - aurora-backend
      - aurora-frontend

networks:
  aurora-network:
    name: aurora-network
    driver: bridge
    external: false

volumes:
  aurora-db-data:
    name: aurora-db-data
    driver: local
  valkey-socket:
    name: valkey-socket
    driver: local
  aurora-configs:
    name: aurora-configs
    driver: local
  caddy-data:
    name: caddy-data
    driver: local
  caddy-config:
    name: caddy-config
    driver: local
